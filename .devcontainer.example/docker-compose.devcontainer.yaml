services:
  workspace:
    image: mcr.microsoft.com/devcontainers/python:trixie@sha256:9e51c13505754efe79dd4a0b1a29523d3854090dabb8add3f3fa642ea3c98fad
    volumes:
      - pulumi:/home/vscode/.pulumi
      - cache:/home/vscode/.cache:delegated
    environment:
      CONTAINER: 1
    healthcheck:
      disable: true

volumes:
  pulumi:
  cache:
